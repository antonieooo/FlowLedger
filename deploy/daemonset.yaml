apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: flow-ledger-node-agent
  namespace: flow-ledger-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: flow-ledger
      app.kubernetes.io/component: node-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flow-ledger
        app.kubernetes.io/component: node-agent
    spec:
      serviceAccountName: flow-ledger-node-agent
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      containers:
        - name: node-agent
          image: flow-ledger:v0
          imagePullPolicy: IfNotPresent
          args:
            - --mode=ebpf
            - --node-name=$(NODE_NAME)
            - --ledger-path=/var/lib/flow-ledger/flows.jsonl
            - --namespace=flow-ledger-system
            - --experiment-configmap=flow-ledger-experiment
            - --metrics-addr=:9090
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
            capabilities:
              add: ["BPF", "NET_ADMIN", "SYS_ADMIN", "SYS_RESOURCE"]
          ports:
            - name: metrics
              containerPort: 9090
              hostPort: 9090
          volumeMounts:
            - name: flow-ledger-data
              mountPath: /var/lib/flow-ledger
            - name: bpffs
              mountPath: /sys/fs/bpf
            - name: debugfs
              mountPath: /sys/kernel/debug
      volumes:
        - name: flow-ledger-data
          hostPath:
            path: /var/lib/flow-ledger
            type: DirectoryOrCreate
        - name: bpffs
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: debugfs
          hostPath:
            path: /sys/kernel/debug
            type: DirectoryOrCreate
