apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: flow-ledger-node-agent
  namespace: flow-ledger-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: flow-ledger
      app.kubernetes.io/component: node-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flow-ledger
        app.kubernetes.io/component: node-agent
    spec:
      serviceAccountName: flow-ledger-node-agent
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      containers:
        - name: node-agent
          image: flow-ledger:v0
          imagePullPolicy: IfNotPresent
          args:
            # v0 Kubernetes deployment is intentionally mock-backed. It validates
            # DaemonSet lifecycle, metadata enrichment, JSONL writing, and metrics;
            # it does not collect real node traffic yet.
            - --mode=mock
            - --mock-events-path=/etc/flow-ledger/mock/flow_events.jsonl
            - --node-name=$(NODE_NAME)
            - --ledger-path=/var/lib/flow-ledger/flows.jsonl
            - --ledger-max-bytes=104857600
            - --ledger-max-age=0s
            - --namespace=flow-ledger-system
            - --experiment-configmap=flow-ledger-experiment
            - --metadata-sync-timeout=30s
            - --allow-unsynced-metadata=false
            - --metrics-addr=:9090
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: metrics
              containerPort: 9090
              hostPort: 9090
          volumeMounts:
            - name: flow-ledger-data
              mountPath: /var/lib/flow-ledger
            - name: mock-events
              mountPath: /etc/flow-ledger/mock
              readOnly: true
      volumes:
        - name: flow-ledger-data
          hostPath:
            path: /var/lib/flow-ledger
            type: DirectoryOrCreate
        - name: mock-events
          configMap:
            name: flow-ledger-mock-events
